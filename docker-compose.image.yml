# Pre-built images from GitHub Container Registry (no local Docker build).
# Requires a checkout or copy of this repo for compose paths, .env, and volume mounts.
#
# Usage (Coolify / Traefik — same routing as docker-compose.yml):
#   docker compose -f docker-compose.image.yml up -d
#
# Local ports (with docker-compose.local.yml):
#   docker compose -f docker-compose.image.yml -f docker-compose.local.yml up -d
#
# Pin a release: set COOL_TTS_IMAGE_TAG=v1.0.0 (or latest) in .env.
services:
  cooltts-api:
    image: ghcr.io/chatondearu/cool-tts-service-api:${COOL_TTS_IMAGE_TAG:-latest}
    volumes:
      - ./generator/models:/app/models
      - ./generator/voices:/app/voices
    environment:
      # Match `ui` service: one FQDN for UI (/) and API (/tts-server) — see docker-compose.yml.
      - SERVICE_URL_COOLTTS_9000=/tts-server
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
      - API_TOKEN=${SERVICE_PASSWORD_APITOKEN}
      - ROOT_PATH=/tts-server
      - KOKORO_AUTO_DOWNLOAD=${KOKORO_AUTO_DOWNLOAD:-}
      - KOKORO_ONNX_VARIANT=${KOKORO_ONNX_VARIANT:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3

  cooltts:
    image: ghcr.io/chatondearu/cool-tts-service-ui:${COOL_TTS_IMAGE_TAG:-latest}
    environment:
      - SERVICE_URL_COOLTTS_3000
      - DOMAIN_NAME=${SERVICE_FQDN_COOLTTS_3000}
      - NUXT_SESSION_PASSWORD=$SERVICE_PASSWORD_SESSION
      - NUXT_API_BASE_URL=http://cooltts-api:9000
      - NUXT_API_TOKEN=$API_TOKEN
      - NUXT_ADMIN_USER=$SERVICE_USER_ADMIN
      - NUXT_ADMIN_PASSWORD=$SERVICE_PASSWORD_ADMIN
    depends_on:
      cooltts-api:
        condition: service_healthy
    restart: unless-stopped
