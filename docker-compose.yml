services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.api.entryPoints=http"
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.api.middlewares=api-strip"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    volumes:
      - ./api/models:/app/models:ro
      - ./api/voices:/app/voices:ro
    environment:
      PYTHONUNBUFFERED: "1"
      API_TOKEN: "${API_TOKEN:-}"
      ROOT_PATH: "/api"
      # Uncomment to use a merged bundle (placed in the voices volume):
      # KOKORO_VOICES_BIN_PATH: /app/voices/merged_voices.bin
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "${UI_PORT:-3000}:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ui.rule=PathPrefix(`/`)"
      - "traefik.http.routers.ui.entryPoints=http"
      - "traefik.http.routers.ui.priority=1"
      - "traefik.http.services.ui.loadbalancer.server.port=3000"
    environment:
      NUXT_SESSION_PASSWORD: "${NUXT_SESSION_PASSWORD:?Set NUXT_SESSION_PASSWORD (min 32 chars)}"
      NUXT_API_BASE_URL: "http://api:8000"
      NUXT_API_TOKEN: "${API_TOKEN:-}"
      NUXT_ADMIN_USER: "${ADMIN_USER:-admin}"
      NUXT_ADMIN_PASSWORD: "${ADMIN_PASSWORD:?Set ADMIN_PASSWORD}"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
