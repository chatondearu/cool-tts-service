services:
  tts:
    build:
      context: ./production_api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./production_api/models:/app/models:ro
      - ./production_api/voices:/app/voices:ro
    environment:
      PYTHONUNBUFFERED: "1"
      # Uncomment to use a merged bundle (placed in the voices volume):
      # KOKORO_VOICES_BIN_PATH: /app/voices/merged_voices.bin
    restart: unless-stopped
