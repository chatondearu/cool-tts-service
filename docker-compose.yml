# cool-tts-service - Docker Compose

services:
  cool-tts-service:
    build: .
    container_name: cool-tts-service
    ports:
      - "8000:8000"  # FastAPI
    volumes:
      - ./app/voices:/app/voices  # Persist voices
      - ./app/cache:/app/cache    # Cache for models
    environment:
      - MODEL_NAME=mistralai/Voxtral-Mini-3B-TTS-2603  # Default model
      - VOICES_DIR=/app/voices
      - CACHE_DIR=/app/cache
      - LOG_LEVEL=info
      # Voxtral weights on Hugging Face are gated: accept the license on the model page, create a read token,
      # then pass it (do not set HF_TOKEN to an empty string — that triggers 401 from the Hub):
      # - HF_TOKEN=hf_...
      # Or use Docker secrets / env_file without blank HF_TOKEN lines.
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'          # Limit to 2 CPU cores
          memory: 4G         # 4GB RAM for Voxtral Mini 3B
        reservations:
          cpus: '1'
          memory: 2G

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3