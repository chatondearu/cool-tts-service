services:
  cooltts-api:
    build:
      context: .
      dockerfile: generator/Dockerfile
      args:
        - APP_VERSION=${APP_VERSION:-0.0.0-dev}
    container_name: cooltts-api
    volumes:
      # Read-write so KOKORO_AUTO_DOWNLOAD and POST /admin/models/upload can persist files.
      - ./generator/models:/app/models
      - ./generator/voices:/app/voices
    environment:
      # Same magic identifier as `ui` so Coolify puts both routes on one FQDN:
      # `/` → port 3000 (ui), `/tts-server` → port 9000 (api). Different ids (e.g. UI vs API) get separate generated hosts, so `/tts-server` on the UI domain never reached the API.
      - SERVICE_URL_COOLTTS_9000=/tts-server
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
      - API_TOKEN=${SERVICE_PASSWORD_APITOKEN}
      - ROOT_PATH=/tts-server
      - KOKORO_AUTO_DOWNLOAD=${KOKORO_AUTO_DOWNLOAD:-}
      - KOKORO_ONNX_VARIANT=${KOKORO_ONNX_VARIANT:-}
      # Uncomment to use a merged bundle (placed in the voices volume):
      # - KOKORO_VOICES_BIN_PATH=${KOKORO_VOICES_BIN_PATH:-/app/voices/merged_voices.bin}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3

  cooltts-ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
      args:
        - APP_VERSION=${APP_VERSION:-0.0.0-dev}
    container_name: cooltts-ui
    environment:
      - SERVICE_URL_COOLTTS_3000=/
      - NUXT_SESSION_PASSWORD=${SERVICE_PASSWORD_SESSION}
      - NUXT_API_BASE_URL=http://api:9000
      - NUXT_API_TOKEN=${SERVICE_PASSWORD_APITOKEN}
      - NUXT_ADMIN_USER=${SERVICE_USER_ADMIN}
      - NUXT_ADMIN_PASSWORD=${SERVICE_PASSWORD_ADMIN}
    depends_on:
      cooltts-api:
        condition: service_healthy
    restart: unless-stopped
