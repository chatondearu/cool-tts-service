# Local development override — no Traefik, direct port mapping.
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up
services:
  api:
    ports:
      - "${API_PORT:-8000}:8000"
    labels: !reset []
    environment:
      ROOT_PATH: ""

  ui:
    ports:
      - "${UI_PORT:-3000}:3000"
    labels: !reset []
    environment:
      # Local: require secrets in .env — SERVICE_* magic vars exist only on Coolify.
      NUXT_SESSION_PASSWORD: "${NUXT_SESSION_PASSWORD:?Set NUXT_SESSION_PASSWORD (min 32 chars)}"
      NUXT_ADMIN_PASSWORD: "${ADMIN_PASSWORD:?Set ADMIN_PASSWORD}"
